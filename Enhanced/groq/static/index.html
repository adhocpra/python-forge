<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Groq Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 600px; height: 80vh; background: #16213e; border-radius: 12px; display: flex; flex-direction: column; padding: 20px; gap: 10px; }
        h2 { text-align: center; color: #e94560; }
        .messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .message { padding: 10px 15px; border-radius: 8px; max-width: 80%; }
        .user { background: #e94560; align-self: flex-end; }
        .bot { background: #0f3460; align-self: flex-start; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #0f3460; color: white; font-size: 16px; }
        button { padding: 12px 20px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        button:hover { background: #c73652; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>Groq Chatbot</h2>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let history = [];

        async function sendMessage() {
            const input = document.getElementById("input");
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, "user");
            input.value = "";

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message, history })
            });

            const data = await response.json();
            addMessage(data.reply, "bot");
            history.push({ role: "user", content: message });
            history.push({ role: "assistant", content: data.reply });
        }

        function addMessage(text, sender) {
            const messages = document.getElementById("messages");
            const div = document.createElement("div");
            div.className = `message ${sender}`;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
